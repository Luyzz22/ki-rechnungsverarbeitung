<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SBS Enterprise{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/design-tokens.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <style>
    :root { --sbs-primary: #003856; --sbs-accent: #FFB900; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
           background: #f4f6f8; color: #1f2a33; }
    .ent-wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 64px; }
    .ent-h1 { color: var(--sbs-primary); font-size: 26px; margin: 8px 0 4px; }
    .ent-sub { color: #5b6b78; margin: 0 0 24px; }
    .kpi-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e6ebef;
            box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .kpi-label { color: #5b6b78; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { color: var(--sbs-primary); font-size: 32px; font-weight: 700; margin-top: 6px; }
    .kpi-note { color: #7a8893; font-size: 12px; margin-top: 4px; }
    .kpi-value.alert { color: #c0392b; }
    table.ent { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    table.ent th, table.ent td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #eef2f5; font-size: 14px; }
    table.ent th { background: var(--sbs-primary); color: #fff; font-weight: 600; }
    table.ent tr:hover td { background: #fafcfd; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge.hoch { background: #fde8e6; color: #c0392b; }
    .badge.mittel { background: #fff4d6; color: #9a6b00; }
    .badge.niedrig { background: #e6f6ec; color: #1e8a4c; }
    .badge.overdue { background: #fde8e6; color: #c0392b; }
    .btn { display: inline-block; border: none; cursor: pointer; padding: 8px 16px; border-radius: 8px;
           font-size: 14px; font-weight: 600; text-decoration: none; }
    .btn-approve { background: #1e8a4c; color: #fff; }
    .btn-reject { background: #c0392b; color: #fff; }
    .btn-primary { background: var(--sbs-accent); color: var(--sbs-primary); }
    .btn-light { background: #eef2f5; color: var(--sbs-primary); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .toolbar input, .toolbar select { padding: 8px 10px; border: 1px solid #ccd6dd; border-radius: 8px; font-size: 14px; }
    a.sort-link { color: var(--sbs-primary); text-decoration: none; }
    a.sort-link.active { color: var(--sbs-accent); font-weight: 700; }
    .pager { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    .muted { color: #7a8893; font-size: 13px; }
    .section-title { color: var(--sbs-primary); font-size: 18px; margin: 28px 0 12px; }
    code.hash { font-family: monospace; font-size: 12px; color: #5b6b78; word-break: break-all; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% include 'partials/header.html' ignore missing %}
  <main class="ent-wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
